media:
  input: public/media
  output: media
content:
  - name: blog
    label: Blog Posts
    path: src/content/blog
    type: collection
    fields:
      - name: title
        label: Title
        type: string
      - name: pubDate
        label: Published Date
        type: date
      - name: description
        label: Description
        type: string
      - name: author
        label: Author
        type: string
      - name: image
        label: Featured Image
        type: object
        fields:
          - name: url
            label: Image
            type: image
          - name: alt
            label: Alt Text
            type: string
      - name: tags
        label: Tags
        type: list
      - name: body
        label: Content
        type: rich-text
    view:
      fields: [title, pubDate, author]
  - name: pages
    label: Pages
    path: src/content/pages
    type: collection
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: string
      - name: layout
        label: Layout
        type: select
        options:
          - value: default
            label: Default
          - value: home
            label: Home
      - name: body
        label: Content
        type: rich-text
    view:
      fields: [title, layout]
